version: '3.8'

services:
  db:
    image: postgres:16
    container_name: flowdesk-db
    restart: always
    environment:
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: Flowdesk2026!
      POSTGRES_DB: flowdesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: flowdesk-api
    restart: always
    env_file:
      - .env
    ports:
      - "80:8000"
    depends_on:
      - db

volumes:
  postgres_data:
